version: '3.8'

services:
  zalo-bot:
    build: .
    container_name: zalo-bot-server
    ports:
      - "5005:5005"
    volumes:
      # Mapping .env để dễ dàng thay đổi cấu hình mà không cần build lại image
      - ./.env:/app/.env
      # Mapping thư mục data để lưu trữ database (tránh lỗi EBUSY khi mount file trực tiếp)
      - ./data:/app/data
    environment:
      - PORT=5005
    restart: always
